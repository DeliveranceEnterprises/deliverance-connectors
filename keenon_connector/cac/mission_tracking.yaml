# MissionTracking — Keenon Connector
# Account: Deliverance (rnLasGAxn5CP7bj32) | Tag: RS EU (hSTlpyR8qtgjSfcT)
# Cloud API mode: connector publishes mission_tracking key-values directly.
# No edge execution — Keenon manages task dispatch on its own.

apiVersion: v0.1
kind: MissionTracking
metadata:
  id: all
  scope: tag/rnLasGAxn5CP7bj32/hSTlpyR8qtgjSfcT
spec:
  processingType:
    - api
  autoClosePreviousMission: true
  attributes:
    mission_tracking:
      type: missionApi
  execution:
    modes:
      start: VLivdzZSG-Mr7hrJ  # Mission
      end: tV3XEvE2zzfnVf8z    # Idle
  stateDefinitions:
    Executing:
      defaultStatus: OK
    Completed:
      defaultStatus: OK
    Canceled:
      defaultStatus: error
    Aborted:
      defaultStatus: error
