apiVersion: v0.1
kind: ActionDefinition
metadata:
  id: keenon-clean-temporary-task
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  type: RunScript
  label: Start Temporary Clean
  group: Cleaning
  description: >
    Start an immediate cleaning task. area_id_list must be a JSON array
    of area IDs (e.g. ["area1","area2"]).
  confirmation:
    required: false
  lock: false
  arguments:
    - name: filename
      type: string
      value: clean_temporary_task
    - name: area_id_list
      type: string
      value: "[]"
      input:
        control: text
    - name: clean_model_id
      type: string
      value: "1"
      input:
        control: text
    - name: clean_times
      type: string
      value: "1"
      input:
        control: text
    - name: back_point_id
      type: string
      value: "1"
      input:
        control: text
---
