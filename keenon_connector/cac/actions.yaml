# ActionDefinition objects expose custom commands in the InOrbit UI.
# Replace [ACCOUNT_ID] and [TAG_ID] with your InOrbit account and tag IDs.

apiVersion: v0.1
kind: ActionDefinition
metadata:
  id: keenon-call-to-point
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  type: RunScript
  label: Send to Point
  group: Delivery
  description: Send the robot to a specific delivery point.
  confirmation:
    required: false
  lock: false
  arguments:
    - name: filename
      type: string
      value: call_to_point
    - name: point_uuid
      type: string
      value: ""
      input:
        control: text
    - name: point_id
      type: string
      value: ""
      input:
        control: text
    - name: scene_code
      type: string
      value: ""
      input:
        control: text
---
apiVersion: v0.1
kind: ActionDefinition
metadata:
  id: keenon-return-to-origin
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  type: RunScript
  label: Return to Origin
  group: Delivery
  description: Send the robot back to its home position (T-series food delivery).
  confirmation:
    required: false
  lock: false
  arguments:
    - name: filename
      type: string
      value: return_to_origin
---
apiVersion: v0.1
kind: ActionDefinition
metadata:
  id: keenon-cancel-task
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  type: RunScript
  label: Cancel Task
  group: Delivery
  description: Cancel an active delivery task by task number.
  confirmation:
    required: true
  lock: false
  arguments:
    - name: filename
      type: string
      value: cancel_task
    - name: task_no
      type: string
      value: ""
      input:
        control: text
---
