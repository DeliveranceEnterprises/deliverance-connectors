spec:
  type: RunScript
  label: Start Temporary Clean
  group: Cleaning
  description: >
    Start an immediate cleaning task. area_id_list must be a JSON array
    of area IDs (e.g. ["area1","area2"]).
  confirmation:
    required: false
  lock: false
  arguments:
    - name: filename
      type: string
      value: clean_temporary_task
