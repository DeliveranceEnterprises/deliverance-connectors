# StatusDefinition objects configure threshold-based fleet status rules.
# Replace [ACCOUNT_ID] and [TAG_ID] with your InOrbit account and tag IDs.

apiVersion: v0.1
kind: StatusDefinition
metadata:
  id: keenon-battery
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  rules:
    - function: BELOW
      params:
        - 0.1
      status: ERROR
    - function: BELOW
      params:
        - 0.2
      status: WARNING
---
apiVersion: v0.1
kind: StatusDefinition
metadata:
  id: keenon-api-connected
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  rules:
    - function: EQUALS
      params:
        - false
      status: ERROR
