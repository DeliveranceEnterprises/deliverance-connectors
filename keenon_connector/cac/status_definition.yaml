# StatusDefinition objects configure threshold-based fleet status rules.
# Replace rnLasGAxn5CP7bj32 and hSTlpyR8qtgjSfcT with your InOrbit account and tag IDs.

apiVersion: v0.1
kind: StatusDefinition
metadata:
  id: keenon-battery
  scope: tag/rnLasGAxn5CP7bj32/hSTlpyR8qtgjSfcT
spec:
  rules:
    - function: BELOW
      params:
        - 0.1
      status: ERROR
    - function: BELOW
      params:
        - 0.2
      status: WARNING
---
apiVersion: v0.1
kind: StatusDefinition
metadata:
  id: keenon-api-connected
  scope: tag/rnLasGAxn5CP7bj32/hSTlpyR8qtgjSfcT
spec:
  rules:
    - function: EQUALS
      params:
        - false
      status: ERROR
