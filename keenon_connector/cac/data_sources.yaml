# DataSourceDefinition objects configure how published key-values appear in
# InOrbit dashboards and timelines.
# Replace [ACCOUNT_ID] and [TAG_ID] with your InOrbit account and tag IDs.

apiVersion: v0.1
kind: DataSourceDefinition
metadata:
  id: keenon-battery
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  label: Battery
  unit: "%"
  scale: 100
  source:
    keyValue:
      key: battery
  timeline:
    fieldType: number
---
