# ActionDefinition objects — Allybot Connector
# Account: Deliverance (rnLasGAxn5CP7bj32) | Tag: Allybot (StdZGa32GmBLReFr)
#
# Cleaning area actions: one action per named area, task_id baked in.
# Add more areas by duplicating the allybot-clean-* pattern below.

apiVersion: v0.1
kind: ActionDefinition
metadata:
  id: allybot-clean-espaitec
  scope: tag/rnLasGAxn5CP7bj32/StdZGa32GmBLReFr
spec:
  type: RunScript
  label: "Clean: Espaitec"
  group: Cleaning
  description: Start the Espaitec cleaning task. Robot returns to dock when done.
  confirmation:
    required: false
  lock: false
  arguments:
    - name: filename
      type: string
      value: start_task
    - name: task_id
      type: string
      value: "ae3178a170b0f97b40e783e7f9dad747"
    - name: reach_charge_point
      type: string
      value: "true"
---
apiVersion: v0.1
kind: ActionDefinition
