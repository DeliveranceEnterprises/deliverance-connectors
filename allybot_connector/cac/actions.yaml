  id: allybot-pause-task
  scope: tag/rnLasGAxn5CP7bj32/StdZGa32GmBLReFr
spec:
  type: RunScript
  label: Pause Task
  group: Cleaning
  description: Pause the currently running cleaning task.
  confirmation:
    required: false
  lock: false
  arguments:
    - name: filename
      type: string
      value: pause_task
---
apiVersion: v0.1
kind: ActionDefinition
metadata:
  id: allybot-resume-task
  scope: tag/rnLasGAxn5CP7bj32/StdZGa32GmBLReFr
