# DataSourceDefinition objects configure how key-values appear in InOrbit.
# Replace [ACCOUNT_ID] and [TAG_ID] with your InOrbit account and tag IDs.

apiVersion: v0.1
kind: DataSourceDefinition
metadata:
  id: allybot-ws-connected
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  label: WS Connected
  source:
    keyValue:
      key: ws_connected
  timeline:
    fieldType: boolean
---
apiVersion: v0.1
kind: DataSourceDefinition
metadata:
  id: allybot-online-status
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
  label: Online
  source:
    keyValue:
      key: online_status
  timeline:
    fieldType: boolean
---
apiVersion: v0.1
kind: DataSourceDefinition
metadata:
  id: allybot-alive-status
  scope: tag/[ACCOUNT_ID]/[TAG_ID]
spec:
